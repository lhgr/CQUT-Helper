name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        default: 'v0.0.0'
      skip_release:
        description: 'Skip creating release?'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check tag matches pubspec version
        env:
          DISPATCH_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          content = Path("pubspec.yaml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9A-Za-z\.\-]+)\+(\d+)\s*$", content, re.M)
          if not match:
            raise SystemExit("pubspec.yaml missing version like x.y.z+N")

          pub_version = match.group(1)

          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          dispatch_tag = os.environ.get("DISPATCH_TAG_NAME", "") or ""

          tag = ref_name if ref_type == "tag" else dispatch_tag
          tag = tag.strip()
          if tag.startswith("v"):
            tag = tag[1:]
          tag = tag.split("+", 1)[0]

          if not tag:
            print("::error ::No tag found (expected tag push or workflow_dispatch tag_name).")
            raise SystemExit(1)

          if pub_version != tag:
            print(f"::error ::pubspec.yaml version ({pub_version}) does not match tag ({tag}). (+build part ignored)")
            raise SystemExit(1)

          print(f"pubspec.yaml version matches tag: {pub_version}")
          PY
      
      - name: Setup Timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get

      - name: Decode Firebase Options
        env:
          FIREBASE_OPTIONS_BASE64: ${{ secrets.FIREBASE_OPTIONS_BASE64 }}
        run: |
          echo $FIREBASE_OPTIONS_BASE64 | base64 -d > lib/firebase_options.dart

      - name: Decode Google Services Json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo $GOOGLE_SERVICES_JSON_BASE64 | base64 -d > android/app/google-services.json
      
      - name: Check Files
        run: |
          ls -l android/app/google-services.json || echo "google-services.json NOT FOUND"
          ls -l lib/firebase_options.dart || echo "firebase_options.dart NOT FOUND"
      
      - name: Resolve Build Version
        id: version
        run: |
          python3 - <<'PY' >> $GITHUB_OUTPUT
          import re
          from pathlib import Path
          content = Path("pubspec.yaml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9A-Za-z\.\-]+)\+(\d+)\s*$", content, re.M)
          if not match:
            raise SystemExit("pubspec.yaml missing version like x.y.z+N")
          build_name = match.group(1)
          build_number = int(match.group(2))
          next_build_number = build_number + 1
          print(f"build_name={build_name}")
          print(f"build_number={build_number}")
          print(f"next_pubspec_version={build_name}+{next_build_number}")
          PY

      - name: Validate Build Number Increment
        uses: actions/github-script@v7
        env:
          CURRENT_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const name = "LAST_SUCCESS_BUILD_NUMBER";
            const current = Number(process.env.CURRENT_BUILD_NUMBER);
            if (!Number.isFinite(current)) {
              core.setFailed(`Invalid current build number: ${process.env.CURRENT_BUILD_NUMBER}`);
              return;
            }

            let previous = null;
            try {
              const res = await github.rest.actions.getRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name
              });
              previous = Number(res.data.value);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (previous !== null && !Number.isFinite(previous)) {
              core.setFailed(`Stored ${name} is invalid: ${previous}`);
              return;
            }

            if (previous !== null && Number.isFinite(previous) && current <= previous) {
              core.setFailed(`Build number must be strictly increasing. current=${current}, previous=${previous}`);
              return;
            }

            core.info(`Build number check passed. current=${current}, previous=${previous ?? "none"}`);
        
      - name: Build Fat APK (Universal)
        run: |
          flutter build apk --release --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CQUT-Helper-universal.apk
        
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.build_name }} --build-number=${{ steps.version.outputs.build_number }}
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: |
          (startsWith(github.ref, 'refs/tags/') || 
          github.event_name == 'workflow_dispatch') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_release == 'false')
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name }}
          name: Release ${{ github.ref_name || github.event.inputs.tag_name }}
          files: |
            build/app/outputs/flutter-apk/CQUT-Helper-universal.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          generate_release_notes: true
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record Successful Build Number
        if: success()
        uses: actions/github-script@v7
        env:
          CURRENT_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const name = "LAST_SUCCESS_BUILD_NUMBER";
            const value = String(process.env.CURRENT_BUILD_NUMBER);

            try {
              await github.rest.actions.getRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name
              });
              await github.rest.actions.updateRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                value
              });
              core.info(`Updated ${name}=${value}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.actions.createRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                value
              });
              core.info(`Created ${name}=${value}`);
            }

      - name: Commit and Push Next pubspec Version to dev
        if: success()
        env:
          TARGET_VERSION: ${{ steps.version.outputs.next_pubspec_version }}
          TARGET_BRANCH: dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" > /dev/null; then
            echo "::error ::Target branch '${TARGET_BRANCH}' does not exist on origin. Cannot write back bumped pubspec version."
            exit 1
          fi
          git fetch origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          target_version = os.environ["TARGET_VERSION"]
          path = Path("pubspec.yaml")
          content = path.read_text(encoding="utf-8")
          updated = re.sub(
              r"^version:\s*[0-9A-Za-z\.\-]+\+\d+\s*$",
              f"version: {target_version}",
              content,
              count=1,
              flags=re.M,
          )
          path.write_text(updated, encoding="utf-8")
          PY
          if git diff --quiet -- pubspec.yaml; then
            echo "pubspec.yaml version already up to date on ${TARGET_BRANCH}"
            exit 0
          fi
          git add pubspec.yaml
          git commit -m "ci: bump version to ${TARGET_VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"
